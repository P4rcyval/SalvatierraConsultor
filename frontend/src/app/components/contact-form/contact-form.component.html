<section class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
  <div class="bg-white shadow-xl rounded-lg overflow-hidden border border-slate-100">
    <div class="px-6 py-8 md:p-12">
      <h2 class="text-3xl font-serif font-bold text-slate-900 mb-2">Solicitar Asesoría</h2>
      <p class="text-slate-600 mb-10">Complete el siguiente formulario y un especialista lo contactará a la brevedad.</p>

      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Nombre -->
        <div class="flex flex-col">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Nombre</label>
          <input 
            type="text" 
            formControlName="nombre"
            class="px-4 py-3 rounded border border-slate-200 focus:border-slate-900 focus:ring-1 focus:ring-slate-900 outline-none transition-all"
            [ngClass]="{'border-red-500': f['nombre'].touched && f['nombre'].errors}"
            placeholder="Ej. Juan">
          <span *ngIf="f['nombre'].touched && f['nombre'].errors" class="text-red-500 text-[10px] mt-1 font-bold uppercase">Nombre requerido</span>
        </div>

        <!-- Apellido -->
        <div class="flex flex-col">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Apellido</label>
          <input 
            type="text" 
            formControlName="apellido"
            class="px-4 py-3 rounded border border-slate-200 focus:border-slate-900 focus:ring-1 focus:ring-slate-900 outline-none transition-all"
            [ngClass]="{'border-red-500': f['apellido'].touched && f['apellido'].errors}"
            placeholder="Ej. Pérez">
          <span *ngIf="f['apellido'].touched && f['apellido'].errors" class="text-red-500 text-[10px] mt-1 font-bold uppercase">Apellido requerido</span>
        </div>

        <!-- Email -->
        <div class="flex flex-col">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Correo Electrónico</label>
          <input 
            type="email" 
            formControlName="email"
            class="px-4 py-3 rounded border border-slate-200 focus:border-slate-900 focus:ring-1 focus:ring-slate-900 outline-none transition-all"
            [ngClass]="{'border-red-500': f['email'].touched && f['email'].errors}"
            placeholder="juan@ejemplo.com">
          <span *ngIf="f['email'].touched && f['email'].errors" class="text-red-500 text-[10px] mt-1 font-bold uppercase">Email válido requerido</span>
        </div>

        <!-- Teléfono -->
        <div class="flex flex-col">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Teléfono</label>
          <input 
            type="text" 
            formControlName="telefono"
            class="px-4 py-3 rounded border border-slate-200 focus:border-slate-900 focus:ring-1 focus:ring-slate-900 outline-none transition-all"
            [ngClass]="{'border-red-500': f['telefono'].touched && f['telefono'].errors}"
            placeholder="+54 11 ...">
          <span *ngIf="f['telefono'].touched && f['telefono'].errors" class="text-red-500 text-[10px] mt-1 font-bold uppercase">Teléfono requerido</span>
        </div>

        <!-- Mensaje -->
        <div class="flex flex-col md:col-span-2">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Consulta o Mensaje</label>
          <textarea 
            rows="4" 
            formControlName="mensaje"
            class="px-4 py-3 rounded border border-slate-200 focus:border-slate-900 focus:ring-1 focus:ring-slate-900 outline-none transition-all resize-none"
            [ngClass]="{'border-red-500': f['mensaje'].touched && f['mensaje'].errors}"
            placeholder="Describa brevemente su necesidad..."></textarea>
          <span *ngIf="f['mensaje'].touched && f['mensaje'].errors" class="text-red-500 text-[10px] mt-1 font-bold uppercase">Mensaje requerido (mín. 10 caracteres)</span>
        </div>

        <!-- Submit Button -->
        <div class="md:col-span-2 pt-4">
          <button 
            type="submit" 
            [disabled]="loading"
            class="w-full bg-slate-900 text-white font-bold py-4 rounded hover:bg-slate-800 transition-colors uppercase tracking-widest text-sm disabled:opacity-50">
            {{ loading ? 'Enviando...' : 'Enviar Solicitud' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
